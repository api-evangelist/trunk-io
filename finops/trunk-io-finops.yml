specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Trunk
providerId: trunk-io
created: '2026-06-20'
modified: '2026-06-20'
reconciled: true
tags:
- Developer Tools
- CI/CD
- Flaky Tests
- Merge Queue
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Trunk platform spend. Trunk bills per committer, with Flaky
  Tests usage measured in test spans (1M test spans per committer included on
  Free and Team). The Free plan covers up to 5 committers at no cost; Team is
  free to start with custom pricing at scale; Enterprise is custom-priced with
  volume discounts on test spans. Code Quality CLI usage and the Merge Queue
  are seat-based features rather than per-call metered APIs.
notes: >-
  Per-committer and at-scale pricing are subject to change; verify against the
  trunk.io/pricing page during reconciliation. Test spans are the primary
  usage driver - reducing flaky-test churn and pruning low-value test runs
  lowers span consumption.
sources:
- https://trunk.io/pricing
- https://docs.trunk.io
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Trunk
serviceCategory: Developer Tools
billingModel:
  pricingCategory: Seat-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Trunk
  ServiceCategory: Developer Tools
  ProviderName: Trunk
  PublisherName: Trunk
  InvoiceIssuerName: Trunk
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingCategory: Seat-Based
meters:
- name: committers
  description: Active committers on the organization, the primary seat-based billing unit.
  unit: committers
  aggregation: max
  dimensions:
  - account
  - repository
- name: test_spans
  description: Test spans ingested for Flaky Tests detection, 1M per committer included; volume-discounted on Enterprise.
  unit: spans
  aggregation: sum
  dimensions:
  - account
  - repository
- name: test_uploads
  description: Test-result uploads (JUnit XML, Bazel BEP, XCResult) ingested via the Analytics CLI / GitHub Action.
  unit: uploads
  aggregation: sum
  dimensions:
  - account
  - repository
  - ci_provider
- name: merge_queue_pull_requests
  description: Pull requests processed through the flake-aware parallel Merge Queue.
  unit: pull_requests
  aggregation: sum
  dimensions:
  - account
  - repository
  - target_branch
principles:
- name: Visibility
  description: Track committer counts and test-span consumption per repository against included allotments.
- name: Allocation
  description: Map committers and repositories to teams/cost centers; tag CI providers feeding uploads.
- name: Optimization
  description: Quarantine and fix flaky tests to cut wasted span consumption and CI reruns; use the Merge Queue to avoid broken-build rework; prune redundant test runs.
- name: Accountability
  description: Assign owners per repository; review committer growth and span usage monthly against the per-committer plan.
maintainers:
